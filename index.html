<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Currículo Inteligente</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script>
        // Injetando a sua paleta de cores personalizada diretamente no Tailwind
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            dark: '#2E1F27',      // Shadow Grey
                            saddle: '#854D27',    // Saddle Brown
                            chocolate: '#DD7230', // Chocolate
                            sun: '#F4C95D',       // Tuscan Sun
                            gold: '#E7E393',      // Light Gold
                        }
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        h1,
        h2,
        h3,
        h4,
        .font-display {
            font-family: 'Lexend Deca', sans-serif;
        }

        /* Custom scrollbar para as sugestões */
        #sugestoes-lista::-webkit-scrollbar,
        #lista-escolaridade-sugestoes::-webkit-scrollbar {
            width: 6px;
        }

        #sugestoes-lista::-webkit-scrollbar-track,
        #lista-escolaridade-sugestoes::-webkit-scrollbar-track {
            background: #f1f5f9;
            border-radius: 10px;
        }

        #sugestoes-lista::-webkit-scrollbar-thumb,
        #lista-escolaridade-sugestoes::-webkit-scrollbar-thumb {
            background: #DD7230;
            border-radius: 10px;
        }
    </style>
</head>

<body class="bg-[#FDFBF9] min-h-screen flex flex-col justify-between text-brand-dark antialiased">

    <div class="flex-grow">
        <header class="py-6 bg-brand-dark text-white border-b border-brand-saddle/20 shadow-md">
            <div class="max-w-7xl mx-auto px-5 flex items-center justify-between">
                <div class="flex items-center gap-3 text-brand-sun">
                    <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"></path>
                        <polyline points="14 2 14 8 20 8"></polyline>
                        <line x1="16" y1="13" x2="8" y2="13"></line>
                        <line x1="16" y1="17" x2="8" y2="17"></line>
                        <line x1="10" y1="9" x2="8" y2="9"></line>
                    </svg>
                    <h1 class="text-2xl font-bold tracking-tight">IA CV</h1>
                </div>
                <div class="text-xs uppercase tracking-widest font-medium text-brand-gold/80">Curriculum Vitae
                    Inteligente</div>
            </div>
        </header>

        <main class="max-w-7xl mx-auto px-5 py-10 grid grid-cols-1 lg:grid-cols-12 gap-10">

            <aside class="lg:col-span-5 space-y-8">
                <div class="bg-white p-8 rounded-3xl border border-stone-200/60 shadow-xl shadow-stone-100">
                    <div class="flex items-center gap-3.5 mb-8">
                        <div class="p-3 bg-brand-chocolate/10 rounded-xl text-brand-chocolate">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round">
                                <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                                <path d="M18.5 2.5a2.121 2.121 0 1 1 3 3L12 15l-4 1 1-4z"></path>
                            </svg>
                        </div>
                        <h2 class="text-xl font-bold tracking-tight text-brand-dark">Seus Dados Profissionais</h2>
                    </div>

                    <form id="resume-form" onsubmit="gerarCurriculo(event)" class="space-y-5">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                            <div>
                                <label for="nome_completo"
                                    class="block text-xs font-semibold uppercase tracking-wider text-brand-saddle mb-1.5">Nome
                                    Completo *</label>
                                <input type="text" id="nome_completo" required placeholder="Ex: Guilherme Silva"
                                    class="w-full p-3.5 bg-stone-50 border border-stone-200 rounded-xl focus:ring-2 focus:ring-brand-chocolate focus:border-brand-chocolate focus:outline-none text-sm transition placeholder:text-stone-400">
                            </div>

                            <div>
                                <label for="cargo_pretendido"
                                    class="block text-xs font-semibold uppercase tracking-wider text-brand-saddle mb-1.5">Cargo
                                    Pretendido *</label>
                                <input type="text" id="cargo_pretendido" required
                                    placeholder="Ex: Desenvolvedor Frontend Júnior"
                                    class="w-full p-3.5 bg-stone-50 border border-stone-200 rounded-xl focus:ring-2 focus:ring-brand-chocolate focus:border-brand-chocolate focus:outline-none text-sm transition placeholder:text-stone-400">
                            </div>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                            <div>
                                <label for="localizacao"
                                    class="block text-xs font-semibold uppercase tracking-wider text-brand-saddle mb-1.5">Localização</label>
                                <input type="text" id="localizacao" placeholder="Ex: Itapeva, SP"
                                    class="w-full p-3.5 bg-stone-50 border border-stone-200 rounded-xl focus:ring-2 focus:ring-brand-chocolate focus:border-brand-chocolate focus:outline-none text-sm transition placeholder:text-stone-400">
                            </div>
                            <div>
                                <label for="contato_email"
                                    class="block text-xs font-semibold uppercase tracking-wider text-brand-saddle mb-1.5">E-mail</label>
                                <input type="email" id="contato_email" placeholder="Ex: nome@email.com"
                                    class="w-full p-3.5 bg-stone-50 border border-stone-200 rounded-xl focus:ring-2 focus:ring-brand-chocolate focus:border-brand-chocolate focus:outline-none text-sm transition placeholder:text-stone-400">
                            </div>
                            <div>
                                <label for="contato_telefone"
                                    class="block text-xs font-semibold uppercase tracking-wider text-brand-saddle mb-1.5">Telefone</label>
                                <input type="text" id="contato_telefone" placeholder="Ex: (15) 99999-9999"
                                    maxlength="15"
                                    class="w-full p-3.5 bg-stone-50 border border-stone-200 rounded-xl focus:ring-2 focus:ring-brand-chocolate focus:border-brand-chocolate focus:outline-none text-sm transition placeholder:text-stone-400">
                            </div>
                        </div>

                        <div class="relative">
                            <label for="tecnologias-input"
                                class="block text-xs font-semibold uppercase tracking-wider text-brand-saddle mb-1.5">Competências
                                e Tecnologias (Enter)</label>
                            <div id="tags-container"
                                class="flex flex-wrap gap-1.5 p-3.5 bg-stone-50 border border-stone-200 rounded-xl focus-within:ring-2 focus-within:ring-brand-chocolate focus-within:border-brand-chocolate transition-all min-h-[52px] cursor-text">
                                <input type="text" id="tecnologias-input" placeholder="Ex: JavaScript, Scrum..."
                                    class="flex-1 bg-transparent border-none outline-none text-sm p-0.5 placeholder:text-stone-400 focus:ring-0 min-w-[150px]">
                            </div>
                            <ul id="sugestoes-lista"
                                class="hidden absolute left-0 right-0 z-50 mt-1.5 max-h-48 overflow-y-auto bg-white border border-stone-200 rounded-xl shadow-xl text-sm divide-y divide-stone-100">
                            </ul>
                        </div>

                        <div class="relative">
                            <label for="escolaridade-input"
                                class="block text-xs font-semibold uppercase tracking-wider text-brand-saddle mb-1.5">
                                Escolaridade (Curso + Nome da Instituição) *
                            </label>
                            <div id="tags-escolaridade-container"
                                class="flex flex-wrap gap-1.5 p-3.5 bg-stone-50 border border-stone-200 rounded-xl focus-within:ring-2 focus-within:ring-brand-chocolate focus-within:border-brand-chocolate transition-all min-h-[52px] cursor-text">
                                <input type="text" id="escolaridade-input"
                                    placeholder="Ex: Técnico em Administração - ETEC..."
                                    class="flex-1 bg-transparent border-none outline-none text-sm p-0.5 placeholder:text-stone-400 focus:ring-0">
                            </div>
                            <ul id="lista-escolaridade-sugestoes"
                                class="hidden absolute left-0 right-0 z-50 mt-1.5 max-h-48 overflow-y-auto bg-white border border-stone-200 rounded-xl shadow-xl text-sm divide-y divide-stone-100">
                            </ul>
                        </div>

                        <div>
                            <label for="texto_experiencias"
                                class="block text-xs font-semibold uppercase tracking-wider text-brand-saddle mb-1.5">
                                Experiência Profissional (Inclua Empresa e Datas) *
                            </label>
                            <textarea id="texto_experiencias" required rows="6"
                                placeholder="Ex: Magazine Luiza | Vendedor (05/2022 a 05/2024)&#10;- Realizei atendimento consultivo...&#10;- Bati metas de vendas mensais..."
                                class="w-full p-3.5 bg-stone-50 border border-stone-200 rounded-xl focus:ring-2 focus:ring-brand-chocolate focus:border-brand-chocolate focus:outline-none text-sm transition-all resize-none placeholder:text-stone-400 leading-relaxed"></textarea>
                        </div>

                   
                        <div class="pt-2 flex flex-col sm:flex-row gap-4">
                            <button type="submit" id="btn-enviar"
                                class="flex-1 bg-brand-chocolate hover:bg-brand-saddle text-white font-bold py-3.5 px-6 rounded-xl transition-all flex justify-center items-center gap-2.5 shadow-md shadow-brand-chocolate/10 text-sm disabled:opacity-70 disabled:cursor-not-allowed">
                                <span>Otimizar com IA ✨</span>
                                <div id="loading-spinner"
                                    class="hidden w-4 h-4 border-2 border-brand-gold border-t-white rounded-full animate-spin">
                                </div>
                            </button>

                            <button type="button" onclick="reiniciarFormulario()"
                                class="sm:w-32 bg-stone-100 hover:bg-stone-200 text-brand-dark font-semibold py-3.5 px-6 rounded-xl text-sm transition flex justify-center items-center">
                                Limpar
                            </button>
                        </div>
                    </form>
                </div>

                <div id="error-message"
                    class="hidden p-5 bg-orange-50 border border-brand-chocolate/20 text-brand-saddle rounded-2xl text-sm flex items-start gap-3 shadow-sm">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                        class="shrink-0 mt-0.5 text-brand-chocolate">
                        <circle cx="12" cy="12" r="10"></circle>
                        <line x1="12" y1="8" x2="12" y2="12"></line>
                        <line x1="12" y1="16" x2="12.01" y2="16"></line>
                    </svg>
                    <span id="error-text" class="leading-relaxed font-medium"></span>
                </div>
            </aside>

            <section class="lg:col-span-7 space-y-6">
                <div id="acoes-container" class="hidden flex justify-end">
                    <button type="button" onclick="baixarCurriculoPDF()"
                        class="inline-flex items-center gap-2.5 bg-brand-dark hover:bg-brand-saddle text-white text-sm font-bold py-3 px-6 rounded-xl transition shadow-lg">
                        <svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v4"></path>
                            <polyline points="7 10 12 15 17 10"></polyline>
                            <line x1="12" y1="15" x2="12" y2="3"></line>
                        </svg>
                        <span>Salvar PDF</span>
                    </button>
                </div>

                <div id="resultado-container"
                    class="bg-white p-10 md:p-12 rounded-3xl shadow-xl shadow-stone-100 border border-stone-200/60 min-h-[500px] flex flex-col justify-center transition-all relative overflow-hidden">

                    <div
                        class="absolute top-0 left-0 right-0 h-1.5 bg-gradient-to-r from-brand-saddle via-brand-chocolate to-brand-sun">
                    </div>

                    <div id="curriculo-placeholder" class="text-center text-stone-400 space-y-4 py-20">
                        <p class="font-semibold text-sm text-brand-saddle">A pré-visualização do seu currículo aparecerá
                            aqui.</p>
                        <p class="text-xs text-stone-400 max-w-xs mx-auto leading-relaxed">Preencha os dados e clique em
                            "Otimizar com IA" para gerar um layout de alta qualidade.</p>
                    </div>

                    <div id="curriculo-conteudo" class="hidden text-xs text-brand-dark space-y-7 leading-relaxed">
                    </div>
                </div>
            </section>

        </main>
    </div>

    <footer class="py-8 border-t border-stone-200/60 bg-white">
        <div class="max-w-7xl mx-auto px-5 text-center text-xs text-stone-500 space-y-1.5">
            <p class="font-bold text-brand-dark">IA CV - Gerador de Currículos Inteligente</p>
            <p>Desenvolvido com Flask e Google Gemini. &copy; 2026</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>

</html>
